# 微信小程序持续集成
# 推送代码到 main 分支后，自动上传体验版（需配置 Secrets）
name: Mini Program CI

on:
  push:
    branches: [main]
  workflow_dispatch:  # 允许在 GitHub 网页手动触发

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install deps
        run: npm install

      # 用 Node 把私钥写入文件，保留换行（与本地 private.key 方式一致）
      - name: Setup private key
        env:
          MP_PRIVATE_KEY: ${{ secrets.MP_PRIVATE_KEY }}
        run: |
          node -e "require('fs').writeFileSync(process.env.GITHUB_WORKSPACE + '/private.key', process.env.MP_PRIVATE_KEY || '', 'utf8');"
          chmod 600 private.key

      - name: Upload to WeChat (experience version)
        env:
          MP_APPID: ${{ secrets.MP_APPID }}
          MP_PRIVATE_KEY_PATH: ${{ github.workspace }}/private.key
          MP_VERSION: ${{ github.run_number }}
          MP_DESC: "CI build #${{ github.run_number }}"
        run: npm run upload:ci
