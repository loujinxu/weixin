# 微信小程序持续集成
# 推送代码到 main 分支后，自动上传体验版（需配置 Secrets）
name: Mini Program CI

on:
  push:
    branches: [main]
  workflow_dispatch:  # 允许在 GitHub 网页手动触发

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install deps
        run: npm install

      # 私钥用 Base64 存在 Secret 里，避免多行被破坏；此处解码后写入文件
      - name: Setup private key
        env:
          MP_PRIVATE_KEY_B64: ${{ secrets.MP_PRIVATE_KEY }}
        run: |
          node -e "const b64=process.env.MP_PRIVATE_KEY_B64||''; require('fs').writeFileSync(process.env.GITHUB_WORKSPACE+'/private.key', Buffer.from(b64,'base64').toString('utf8'), 'utf8');"
          chmod 600 private.key

      - name: Upload to WeChat (experience version)
        env:
          MP_APPID: ${{ secrets.MP_APPID }}
          MP_PRIVATE_KEY_PATH: ${{ github.workspace }}/private.key
          MP_VERSION: ${{ github.run_number }}
          MP_DESC: "CI build #${{ github.run_number }}"
        run: npm run upload:ci
